@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--bg2:#F6F8FA;--bg3:#EAEEF2;--bg4:#D0D7DE;--bg5:#C8CFD8;
  --border:#D0D7DE;--border2:#B0B8C1;
  --text:#1F2328;--text2:#57606A;--text3:#8C959F;
  --accent:#2F5D50;--accent2:#1E4035;--accent3:#0F2D24;
  --green:#1A7F37;--green-bg:rgba(26,127,55,0.08);--green-glow:rgba(26,127,55,0.15);
  --red:#CF222E;--red-bg:rgba(207,34,46,0.08);
  --yellow:#9A6700;--yellow-bg:rgba(154,103,0,0.08);
  --blue:#0969DA;--blue-bg:rgba(9,105,218,0.08);
  --purple:#8250DF;--purple-bg:rgba(130,80,223,0.08);
  --orange:#BC4C00;
  --radius:6px;--radius-sm:4px;--radius-lg:8px;
  --font:'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho','YuMincho','游明朝',serif;--serif:'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho',serif;--mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{display:flex;flex-direction:column;padding:env(safe-area-inset-top,0px) 0 0;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-row1{display:flex;align-items:center;gap:6px;padding:6px 12px;min-height:40px}
.topbar-row2{display:flex;align-items:center;gap:6px;padding:4px 12px 6px;border-top:1px solid rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3A3530,#1A1A1A);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(30,30,30,0.2),0 4px 12px rgba(0,0,0,0.4)}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-main{font-size:14px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(90deg,#fff,#9c7fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:1.5px;font-weight:500;text-transform:uppercase}
.topbar-sep{width:1px;height:28px;background:var(--border2)}
.topbar-title{font-size:12px;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* リアルタイムインジケーター */
.realtime-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;background:var(--green-bg);border:1px solid rgba(46,204,140,0.3);font-size:11px;color:var(--green);font-weight:600;flex-shrink:0}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.clock{font-family:var(--mono);font-size:12px;color:var(--text2);flex-shrink:0}

/* 検索 */
.search-wrap{position:relative;flex-shrink:0;flex:1;max-width:460px}
.search-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px 6px 32px;font-size:12px;color:var(--text);font-family:var(--font);width:200px;outline:none;transition:all 0.2s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent);width:260px;box-shadow:0 0 0 3px rgba(124,111,255,0.12)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 6px);right:0;width:380px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);z-index:200;max-height:420px;overflow-y:auto;display:none;box-shadow:0 16px 48px rgba(0,0,0,0.6)}
.search-results.open{display:block}
.search-result-item{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-result-item:last-child{border-bottom:none}
.search-loading{padding:14px;text-align:center;color:var(--text3);font-size:12px}

/* ── BODY ── */
#app{flex-direction:column}
.body-wrap{display:flex;flex:1;min-height:0;min-width:0}

/* ── SIDEBAR ── */
.sidebar{width:160px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;min-height:0}
.sidebar-sec{padding:10px 10px 4px;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.acct-list{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.acct-item{padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.15s;position:relative;font-size:12px}
.acct-item:hover{background:var(--bg3)}
.acct-item.active{background:var(--bg4);border-color:var(--border2)}
.acct-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0}
.acct-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-biz{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.sidebar-foot{padding:10px;border-top:1px solid var(--border)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0;padding-bottom:80px}
.tabs-bar{display:flex;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{padding:14px 12px 13px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;font-family:var(--font);transition:all 0.15s;font-weight:500}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:900;border-bottom-width:3px}
.content{flex:1;padding:16px 16px calc(72px + env(safe-area-inset-bottom,0px));background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.ntag{font-size:9px;padding:1px 5px;border-radius:99px;background:rgba(192,132,252,0.2);color:var(--purple);margin-left:3px;vertical-align:middle}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;color:var(--text);letter-spacing:0.2px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi{background:transparent;border:none;border-radius:var(--radius);padding:10px 14px;position:relative;overflow:hidden;transition:all 0.2s;cursor:default}
.kpi:hover{background:var(--bg3);border-color:var(--border2)}
.kpi::after{content:'';position:absolute;inset:0;opacity:0.04;pointer-events:none}
.kpi.green::after{background:var(--green)}
.kpi.red::after{background:var(--red)}
.kpi.blue::after{background:var(--blue)}
.kpi.yellow::after{background:var(--yellow)}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;font-weight:600}
.kpi-value{font-size:20px;font-weight:600;font-family:var(--mono);letter-spacing:-0.5px;line-height:1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px}
.kpi-badge{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:600}
.kpi-bar{position:absolute;bottom:0;left:0;height:2px;border-radius:0 0 var(--radius-lg) var(--radius-lg);transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.kpi-icon{position:absolute;top:12px;right:14px;font-size:20px;opacity:0.15}

/* リアルタイムカウンター アニメーション */
@keyframes countUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.animate-count{animation:countUp 0.4s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease-out}

/* ── 損益チャートエリア ── */
.pl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-wrap{background:var(--bg3);border-radius:var(--radius);padding:12px;position:relative}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.chart-bar-label{width:80px;color:var(--text2);flex-shrink:0;text-align:right;font-size:10px}
.chart-bar-track{flex:1;background:var(--bg4);border-radius:99px;height:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1)}
.chart-bar-value{width:70px;font-family:var(--mono);font-size:10px;color:var(--text2);flex-shrink:0}

/* ── 月次サマリーグラフ ── */
.sparkline-wrap{display:flex;align-items:flex-end;gap:3px;height:48px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;transition:height 0.6s ease;min-height:2px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);transition:color 0.1s}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);color:var(--text)}

/* ── BADGES ── */
.badge{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap;display:inline-block;font-weight:600}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.tax8{background:rgba(46,204,140,0.12);color:var(--green);font-size:10px;padding:1px 6px;border-radius:99px;font-family:var(--mono);font-weight:600}
.tax10{background:rgba(77,159,255,0.12);color:var(--blue);font-size:10px;padding:1px 6px;border-radius:99px;font-family:var(--mono);font-weight:600}
.taxfree{background:rgba(255,204,68,0.12);color:var(--yellow);font-size:10px;padding:1px 6px;border-radius:99px;font-family:var(--mono);font-weight:600}
.phase1{background:rgba(46,204,140,0.15);color:var(--green);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600}
.phase2{background:rgba(124,111,255,0.15);color:var(--accent);font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600}

/* ── FORMS ── */
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.form-label{font-size:11px;color:var(--text3);width:76px;flex-shrink:0;padding-top:8px}
input[type=text],input[type=email],input[type=number],input[type=date],input[type=time],select,textarea{
  padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12px;background:var(--bg3);color:var(--text);font-family:var(--font);width:100%;
  outline:none;transition:border-color 0.15s,box-shadow 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,111,255,0.1)}
textarea{resize:vertical;min-height:60px}
select option{background:var(--bg3)}

/* ── BUTTONS ── */
.btn{padding:5px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--font);transition:all 0.15s;font-weight:500}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--accent2);color:#fff;border-color:transparent;font-weight:700;box-shadow:0 2px 12px rgba(90,79,255,0.4)}
.btn-primary:hover{background:var(--accent3)}
.btn-sm{padding:4px 10px;font-size:13px}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-success:hover{background:var(--green-bg)}
.btn-ghost{border-color:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;background:var(--bg3);transition:all 0.2s}
.upload-area:hover{border-color:var(--accent);background:rgba(124,111,255,0.05)}

/* ── ALERTS ── */
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:8px;border:1px solid transparent}
.a-green{background:var(--green-bg);color:var(--green);border-color:rgba(46,204,140,0.25)}
.a-red{background:var(--red-bg);color:var(--red);border-color:rgba(255,95,126,0.25)}
.a-yellow{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(255,204,68,0.25)}
.a-blue{background:var(--blue-bg);color:var(--blue);border-color:rgba(77,159,255,0.25)}

/* ── LOADING ── */
.loading-inline{text-align:center;padding:20px;color:var(--text3);font-size:12px}
.dot-anim::after{content:'.';animation:dots 1.2s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:12px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:22px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px}
.ai-box{background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--text2);margin-top:10px;line-height:1.8}
.review-item{background:var(--bg3);border:1px solid rgba(255,204,68,0.3);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}

/* ── 仕訳の流れ ── */
.stream-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0;overflow:hidden}
.stream-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;transition:background 0.3s}
.stream-row:last-child{border-bottom:none}
.stream-row.new{background:rgba(124,111,255,0.06);animation:streamIn 0.4s ease-out}
@keyframes streamIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
/* stream-row内はインラインスタイルで管理 */

/* ── 除外バッジ ── */
.exclude-row{padding:5px 8px;background:rgba(255,95,126,0.06);border-radius:var(--radius-sm);font-size:11px;color:var(--red);margin-bottom:3px;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,95,126,0.15)}

/* ── 損益バー ── */
.pl-bar-container{margin-bottom:14px}
.pl-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.pl-bar-track{background:var(--bg4);border-radius:99px;height:10px;overflow:hidden}
.pl-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ── 月別グラフ ── */
.monthly-chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.month-bar-wrap{flex:1;display:flex;align-items:flex-end;gap:1px;width:100%}
.month-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height 0.8s ease}
.month-label{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .pl-grid{grid-template-columns:1fr}
  .search-input{width:120px}
  .tabs-bar{display:none !important}
  .content{padding:10px;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
}

/* ── モバイルボトムナビ ── */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:8px 4px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  z-index:100;
  flex-direction:row;align-items:center;justify-content:space-around;
  box-shadow:0 -4px 20px rgba(0,0,0,0.4);
}
.mobile-nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 8px;border:none;background:transparent;cursor:pointer;
  font-size:9px;color:var(--text3);font-family:var(--font);font-weight:500;
  border-radius:var(--radius-sm);transition:all 0.15s;min-width:52px;
}
.mobile-nav-btn.active{color:var(--accent)}
.mobile-nav-btn .nav-icon{font-size:22px;line-height:1}


@media(max-width:768px){
  .mobile-nav{display:flex}
  /* モバイル1段トップバー */
  .topbar-row1{padding:6px 8px;min-height:44px;gap:4px;flex-wrap:nowrap;align-items:center}
  .logo img{height:24px !important}
  .logo-text{display:none !important}
  .topbar-sep{display:none !important}
  .topbar-title{display:none !important}
  #clock{display:none !important}
  #current-member-badge{display:none !important}
  #rt-badge{display:none !important}
  /* モバイルでは奥の間・退出を非表示 */
  button[onclick="showSettings()"]{display:none !important}
  button[onclick="doLogout()"]{display:none !important}
  .topbar-row2{display:none !important}
  .search-wrap{flex:1;min-width:0}
  .search-input{font-size:11px}
  #topbar-acct-btn{max-width:70px !important;font-size:11px !important;padding:3px 8px !important}
  #mode-toggle{flex-shrink:0}
}

/* 和風アクセント */
.wafuu-title{font-family:var(--serif);letter-spacing:0.05em}
.page-title-jp{font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:0.03em}
.card-title{font-family:var(--serif)}
.modal-title{font-family:var(--serif)}

/* ── シートメニュー（freee風） ── */
.sheet-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 150;
  transition: background .25s; pointer-events: none;
}
.sheet-bg.open { background: rgba(0,0,0,.45); pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-radius: 16px 16px 0 0;
  padding: 0 0 calc(16px + env(safe-area-inset-bottom,0px));
  transform: translateY(100%); transition: transform .28s cubic-bezier(.32,1,.36,1);
  z-index: 151; max-height: 70vh; overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 4px; }
.sheet-title { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; padding: 8px 16px 10px; border-bottom: 1px solid var(--border); }
.sheet-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.sheet-item:last-child { border-bottom: none; }
.sheet-item:active { background: var(--bg2); }
.sheet-item-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
.sheet-item-text { flex: 1; }
.sheet-item-label { font-size: 14px; font-weight: 600; margin-bottom: 1px; }
.sheet-item-sub { font-family: var(--sans); font-size: 11px; color: var(--text3); }
.sheet-item-arrow { font-size: 14px; color: var(--border2); }

/* ═══ デモツアー ═══ */
.tour-highlight{position:fixed;z-index:9001;border-radius:8px;box-shadow:0 0 0 4000px rgba(0,0,0,0.55);pointer-events:none;transition:all 0.35s cubic-bezier(.4,0,.2,1)}
.tour-bubble{position:fixed;z-index:9002;background:#fff;border-radius:12px;padding:18px 20px;max-width:290px;width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.22);pointer-events:all;transition:all 0.35s cubic-bezier(.4,0,.2,1)}
.tour-bubble::after{content:'';position:absolute;width:12px;height:12px;background:#fff;transform:rotate(45deg)}
.tour-bubble.ab::after{bottom:-6px;left:50%;margin-left:-6px}
.tour-bubble.at::after{top:-6px;left:50%;margin-left:-6px}
.tour-bubble.al::after{left:-6px;top:24px}
.tour-step-no{font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:0.5px;margin-bottom:5px;padding-right:20px}
.tour-title{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--text)}
.tour-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.tour-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tour-dots{display:flex;gap:4px;align-items:center}
.tour-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.tour-dot.on{background:var(--accent2);width:16px;border-radius:3px;transition:width 0.2s}
.tour-next{padding:6px 16px;background:var(--accent2);color:#fff;border:none;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.tour-finish{padding:6px 16px;background:linear-gradient(135deg,#7c6fff,#2F5D50);color:#fff;border:none;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.tour-skip{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--font);flex-shrink:0}

<body>

// fileToBase64: ファイルをBase64文字列に変換（画像は自動圧縮）
function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    // PDFはそのまま返す
    if (file.type === 'application/pdf') {
      var reader = new FileReader();
      reader.onload = function(e) { resolve(e.target.result.split(',')[1]); };
      reader.onerror = function(e) { reject(e); };
      reader.readAsDataURL(file);
      return;
    }
    // 画像は1200px・75%に圧縮してから返す
    compressImage(file, 1200, 0.75, function(blob, dataUrl) {
      resolve(dataUrl.split(',')[1]);
    });
  });
}

// getPendingCount: 未確認・要吟味の仕訳件数を返す
function getPendingCount(a) {

// ── シートメニュー（freee風 下から展開） ──
function openSheet(titleText, items) {
  // 既存のシートがあれば削除
  const existing = document.getElementById('sheet-container');
  if (existing) existing.remove();

  const container = document.createElement('div');
  container.id = 'sheet-container';

  const bg = document.createElement('div');
  bg.className = 'sheet-bg';
  bg.onclick = function() { closeSheet(); };

  const sheet = document.createElement('div');
  sheet.className = 'sheet';

  let inner = '<div class="sheet-handle"></div>';
  if (titleText) inner += '<div class="sheet-title">' + titleText + '</div>';

  items.forEach(function(item, idx) {
    inner += '<div class="sheet-item" data-sheet-idx="' + idx + '">'
      + '<div class="sheet-item-icon">' + item.icon + '</div>'
      + '<div class="sheet-item-text">'
      + '<div class="sheet-item-label">' + item.label + '</div>'
      + (item.sub ? '<div class="sheet-item-sub">' + item.sub + '</div>' : '')
      + '</div>'
      + '<div class="sheet-item-arrow">›</div>'
      + '</div>';
  });

  sheet.innerHTML = inner;
  // イベントをDOMで設定（インラインonclickを避ける）
  sheet.querySelectorAll('.sheet-item').forEach(function(el) {
    var idx = parseInt(el.dataset.sheetIdx);
    var item = items[idx];
    if (!item) return;
    el.onclick = function() {
      closeSheet();
      try { eval(item.action); } catch(e) { console.error('sheet action error:', e); }
    };
  });
  container.appendChild(bg);
  container.appendChild(sheet);
  document.getElementById('app').appendChild(container);

  // アニメーション
  requestAnimationFrame(function() {
    bg.classList.add('open');
    sheet.classList.add('open');
  });
}

function closeSheet() {
  document.body.style.overflow = '';
  const container = document.getElementById('sheet-container');
  if (!container) return;
  const bg = container.querySelector('.sheet-bg');
  const sheet = container.querySelector('.sheet');
  if (bg) bg.classList.remove('open');
  if (sheet) sheet.classList.remove('open');
  setTimeout(function() { if (container.parentNode) container.remove(); }, 280);
}

document.addEventListener('change', function(e) {
  if (!e.target) return;
  var id = e.target.id;
  if (id !== 'j-payment' && id !== 'j-amt') return;
  var payEl = document.getElementById('j-payment');
  var amtEl = document.getElementById('j-amt');
  var noRcptEl = document.getElementById('j-no-receipt');
  var reasonEl = document.getElementById('j-no-receipt-reason');
  var wrapEl  = document.getElementById('j-no-receipt-reason-wrap');
  if (!payEl || !noRcptEl) return;
  var payment = payEl.value;
  var amt = parseInt(amtEl ? amtEl.value : '0') || 0;
  var icPayments   = ['Suica','nanaco','WAON','楽天Edy','iD','QUICPay'];
  var bankPayments = ['ゆうちょPay','銀行振込'];
  if (icPayments.includes(payment)) {
    noRcptEl.checked = true;
    if (reasonEl) reasonEl.value = 'ic';
    if (wrapEl) wrapEl.style.display = 'block';
  } else if (bankPayments.includes(payment)) {
    noRcptEl.checked = true;
    if (reasonEl) reasonEl.value = 'bank';
    if (wrapEl) wrapEl.style.display = 'block';
  } else if (id === 'j-amt' && amt > 0 && amt < 3000 && !noRcptEl.checked) {
    noRcptEl.checked = true;
    if (reasonEl) reasonEl.value = 'small';
    if (wrapEl) wrapEl.style.display = 'block';
  }
});
