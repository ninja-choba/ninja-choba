<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忍者帳場 v2026-05-18_v001</title>

<style>
:root{
  --bg:#FAF9F6;
  --text:#1F1F1F;
  --sub:#66605A;
  --accent:#2F5D50;
  --warn:#B88B4A;
  --card:#FFFFFF;
  --border:#E5E0D8;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Noto Sans JP",sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:22px;
  font-weight:700;
}

.version{
  font-size:12px;
  color:var(--sub);
}

.container{
  max-width:720px;
  margin:40px auto;
  padding:0 20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.03);
}

h1{
  margin-top:0;
}

.sub{
  color:var(--sub);
  line-height:1.8;
}

.btn{
  display:inline-block;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:999px;
  padding:14px 24px;
  font-size:16px;
}

.btn-sub{
  background:transparent;
  color:var(--accent);
  border:1px solid var(--accent);
}

.warn{
  color:var(--warn);
  margin-top:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>
    <div class="logo">忍者帳場</div>
    <div class="version">v2026-05-18_v001</div>
  </div>

  <button class="btn btn-sub">姿を消す</button>
</div>

<div class="container">

  <div class="card">
    <h1>門前</h1>

    <p class="sub">
      撮る。アップする。メモする。<br>
      後で整理する前提で、まず忘れない。
    </p>

    <button class="btn">撮る</button>
  </div>

  <div class="card">
    <h1>今月の状態</h1>

    <p class="sub">
      大きな問題はありません。<br>
      要確認事項：2件
    </p>

    <div class="warn">
      ・証憑不足が1件あります
    </div>
  </div>

</div>

  <script src="js/app.js"></script>

</body>
</html>
