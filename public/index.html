<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' https:;
  script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data: blob: https:;
  connect-src 'self'
    https://api.anthropic.com
    https://*.supabase.co
    https://api.freee.co.jp
    https://notify-api.line.me
    https://api.stripe.com;
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
">
<meta name="app-version" content="20260510">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="忍者帳場">
<meta name="description" content="個人事業主・フリーランス向けAI経理アプリ。レシート撮影で自動仕訳、確定申告もサポート。">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
<link rel="apple-touch-startup-image" href="/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>忍者帳場 v7</title>

<link rel="stylesheet" href="styles/app.css">
</head>
<body>
<div id="pw-screen">

  <!-- ログインカード -->
  <div class="login-card">
    <img src="assets/logo.jpg" alt="忍者帳場" class="login-logo">
    <div class="tab-bar">
      <button id="tab-login" class="active">ログイン</button>
      <button id="tab-signup" class="inactive">新規登録</button>
    </div>
    <!-- ログインフォーム -->
    <div id="login-form">
      <input id="login-email-input" type="email" class="form-inp" placeholder="メールアドレス">
      <input id="login-pw-input" type="password" class="form-inp" placeholder="パスワード">
      <div id="pw-error" style="display:none;color:var(--red);font-family:var(--sans);font-size:11px;margin-bottom:8px;text-align:left"></div>
      <button class="btn-primary" id="login-submit-btn">ログイン</button>
      <button class="btn-secondary" id="demo-submit-btn">デモを試す（登録不要）</button>
    </div>
    <!-- 新規登録フォーム -->
    <div id="signup-form" style="display:none">
      <input id="signup-name" class="form-inp" placeholder="お名前（任意）">
      <input id="signup-email" type="email" class="form-inp" placeholder="メールアドレス">
      <input id="signup-pw" type="password" class="form-inp" placeholder="パスワード（8文字以上）">
      <input id="signup-pw2" type="password" class="form-inp" placeholder="パスワード（確認）">
      <input id="signup-invite" class="form-inp" placeholder="招待コード（任意）">
      <div id="signup-error" style="display:none;color:var(--red);font-family:var(--sans);font-size:11px;margin-bottom:8px;text-align:left"></div>
      <button class="btn-primary" id="signup-submit-btn">14日間無料で始める</button>
      <div style="font-family:var(--sans);font-size:10px;color:var(--text3);margin-top:8px;line-height:1.6">
        登録することで<a href="/privacy.html" target="_blank" style="color:var(--text3)">プライバシーポリシー</a>に同意したものとみなします
      </div>
    </div>
    <div class="version-tag">v20260510</div>
  </div>
</div>
<div id="app" style="display:none;flex-direction:column;height:100vh;overflow:hidden">

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div id="mode-toggle" style="margin-right:8px"></div>
  <div class="logo">
    <img src="assets/logo.jpg" alt="忍者帳場" style="height:28px;filter:none;border-radius:3px">
    <div class="logo-text">
      <span class="logo-sub">Real-Time v7</span>
    </div>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-title" id="topbar-title"></div>
  <div class="realtime-badge" id="rt-badge" style="display:none">
    <div class="pulse-dot"></div>
    <span>リアルタイム処理中</span>
    <span id="rt-count" style="font-family:var(--mono)">0件</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
  <div id="current-member-badge" onclick="showMemberSelectModal()" style="font-family:var(--sans);font-size:11px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:99px;white-space:nowrap">入力者未設定</div>
  <div style="display:flex;align-items:center;gap:8px;margin-right:8px">
    <span id="auth-user-display" style="font-size:11px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button onclick="doLogout()" title="ログアウト"
      style="padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:10px;color:var(--text3);cursor:pointer;display:none" id="logout-btn">
      ログアウト
    </button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" placeholder="勘定科目・税率を質問..." oninput="handleSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)">
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<!-- ── モバイル事業者選択バー ── -->
<div class="mobile-acct-bar" id="mobile-acct-bar"></div>
<div id="trial-banner" style="display:none"></div>

<div class="body-wrap">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div id="sb-logo" class="sb-logo" style="display:none">
    <div class="sb-logo-text">忍者帳場</div>
    <div class="sb-logo-sub">NINJA-CHOBA</div>
  </div>
  <div class="sidebar-sec">事業</div>
  <div class="acct-list" id="acct-list"></div>
  <div id="desktop-nav" style="display:none">
    <!-- デスクトップ用ナビ（JS で描画） -->
  </div>
  <div class="sidebar-foot">
    <button class="btn btn-primary btn-sm" style="width:100%" onclick="showAddAccount()">＋ 事業を追加</button>
    <button class="btn btn-sm" style="width:100%;margin-top:6px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)" onclick="showHelpIndex()">解決手引</button>
    <button class="btn btn-sm" style="width:100%;margin-top:6px;background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(170,119,0,.2)" onclick="loadSuzukiDummyData()"> テストデータ読込</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="tabs-bar" id="tabs-bar" style="display:none">
    <button class="tab active" onclick="switchTab('dashboard')"> ダッシュボード</button>
    <button class="tab" onclick="switchTab('auto')"> 自動仕訳<span class="ntag">RT</span></button>
    <button class="tab" onclick="switchTab('pl')"> 損益計算書</button>
    <button class="tab" onclick="switchTab('receipt')"> レシート</button>
    <button class="tab" onclick="switchTab('review')">! 要確認<span id="review-badge" class="badge b-red" style="margin-left:3px;display:none"></span></button>
    <button class="tab" onclick="switchTab('gmail')"> Gmail</button>
    <button class="tab" onclick="switchTab('invoices')"> 請求書</button>
    <button class="tab" onclick="switchTab('journal')"> 仕訳帳</button>
    <button class="tab" onclick="switchTab('rules')"> ルール集</button>
    <button class="tab" onclick="switchTab('freee')"> freee連携<span class="ntag">API</span></button>
    <button class="tab" onclick="switchTab('hojoconfirm')"> 帳場で確認</button>
    <button class="tab" onclick="switchTab('checklist')"> 確定申告<span class="ntag">AI</span></button>
    <button class="tab" onclick="switchTab('partners')"> 取引先</button>
    <button class="tab" onclick="switchTab('budget')"> 予算管理</button>
    <button class="tab" onclick="switchTab('notify')"> 通知設定</button>
    <button class="tab" id="tab-realestate" onclick="switchTab('realestate')"> 不動産<span class="ntag">NEW</span></button>
    <button class="tab" onclick="switchTab('tax')"> 消費税</button>
    <button class="tab" onclick="switchTab('kasan')"> 家事按分</button>
    <button class="tab" onclick="switchTab('assets')"> 固定資産</button>
    <button class="tab" onclick="switchTab('bs')"> 貸借対照表</button>
  </div>
  <div class="page-watermark" id="global-watermark"><img src="assets/logo.jpg" alt=""></div>
<div class="content" id="main-content">
    <div style="text-align:center;padding:60px 20px">
      <img src="assets/logo.jpg" alt="忍者帳場" style="width:240px;margin-bottom:16px;filter:none;border-radius:4px">
      
    </div>
  </div>
</div>

</div>
</div>

<!-- ── モバイルボトムナビ ── -->
<div class="mobile-nav" id="mobile-nav" style="display:none">
  <button class="mobile-nav-btn active" id="mnav-dashboard" onclick="mobileTab('dashboard')">
    <span class="nav-icon" style="font-size:18px;line-height:1">宅</span><span>ホーム</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-receipt" onclick="showCaptureMenu()">
    <span class="nav-icon" style="font-size:20px;line-height:1">撮</span><span>撮影</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-journal" onclick="showLedgerMenu()">
    <span class="nav-icon" style="font-size:18px;line-height:1">帳</span><span>帳簿</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-checklist" onclick="showTaxMenu()">
    <span class="nav-icon" style="font-size:18px;line-height:1">申</span><span>申告</span>
  </button>
  <button class="mobile-nav-btn" id="mnav-more" onclick="showMobileMenu()">
    <span class="nav-icon" style="font-size:18px;line-height:1">≡</span><span>メニュー</span>
  </button>
</div>

<!-- ── モバイルメニューパネル ── -->
<div id="mobile-menu-panel" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75)" onclick="hideMobileMenu()">
  <div id="mobile-menu-inner" style="position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:16px 16px 0 0;padding:16px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));max-height:85vh;overflow-y:auto" onclick="event.stopPropagation()">
    <div style="width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 16px"></div>
    <!-- 内容はshowMobileMenu()で動的生成 -->
  </div>
</div>

<script src="scripts/app.js"></script>
</body>
</html>
