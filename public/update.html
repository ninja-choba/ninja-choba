<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忍者帳場AI — アップデート</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080810; color: #eeeef5;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #0f0f1a; border: 1px solid #252538; border-radius: 16px;
    padding: 32px 28px; width: 100%; max-width: 420px;
  }
  .logo { font-size: 40px; text-align: center; margin-bottom: 8px; filter: drop-shadow(0 0 20px rgba(124,111,255,0.5)); }
  h1 { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 4px;
    background: linear-gradient(90deg,#fff,#9c7fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 11px; color: #4a4a6a; text-align: center; margin-bottom: 28px; }
  label { font-size: 11px; color: #7a7a9a; display: block; margin-bottom: 4px; }
  input[type="password"], input[type="file"] {
    width: 100%; padding: 11px 14px; background: #161625; border: 1px solid #353558;
    border-radius: 8px; color: #eeeef5; font-size: 14px; outline: none;
    margin-bottom: 14px; font-family: sans-serif;
  }
  .drop-area {
    border: 2px dashed #353558; border-radius: 12px; padding: 32px 20px;
    text-align: center; cursor: pointer; margin-bottom: 14px;
    transition: all 0.2s; background: #161625;
  }
  .drop-area.dragover { border-color: #7c6fff; background: rgba(124,111,255,0.08); }
  .drop-area.has-file { border-color: #2ecc8c; background: rgba(46,204,140,0.06); }
  .drop-icon { font-size: 36px; margin-bottom: 8px; }
  .drop-text { font-size: 13px; color: #7a7a9a; }
  .drop-filename { font-size: 13px; color: #2ecc8c; font-weight: 700; margin-top: 6px; }
  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: sans-serif;
    background: linear-gradient(135deg, #7c6fff, #3d2fff); color: #fff;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin-top: 14px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; display: none;
  }
  .status.loading { background: rgba(77,159,255,0.1); border: 1px solid rgba(77,159,255,0.2); color: #4d9fff; }
  .status.success { background: rgba(46,204,140,0.1); border: 1px solid rgba(46,204,140,0.2); color: #2ecc8c; }
  .status.error   { background: rgba(255,95,126,0.1);  border: 1px solid rgba(255,95,126,0.2);  color: #ff5f7e; }
  .progress { height: 4px; background: #252538; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: linear-gradient(90deg,#7c6fff,#3d2fff); border-radius: 2px; width: 0%; transition: width 0.3s; }
  .back { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: #5a5a7a; text-decoration: none; }
  .back:hover { color: #9c7fff; }
  .steps { margin-bottom: 20px; }
  .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 12px; color: #7a7a9a; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #252538; color: #9c7fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🥷</div>
  <h1>忍者帳場AI アップデート</h1>
  <div class="sub">管理者専用 — このページは非公開です</div>

  <div class="steps">
    <div class="step"><div class="step-num">1</div><span>このチャットから <strong style="color:#eeeef5">ninja_choba_v7.html</strong> をダウンロード</span></div>
    <div class="step"><div class="step-num">2</div><span>下に管理者パスワードを入力</span></div>
    <div class="step"><div class="step-num">3</div><span>ファイルをアップロードして「更新する」を押す</span></div>
  </div>

  <label>管理者パスワード</label>
  <input type="password" id="admin-pw" placeholder="管理者パスワード"
    onkeydown="if(event.key==='Enter')document.getElementById('file-drop').click()">

  <label>更新ファイル（ninja_choba_v7.html）</label>
  <div class="drop-area" id="drop-area"
    onclick="document.getElementById('file-input').click()"
    ondragover="event.preventDefault();this.classList.add('dragover')"
    ondragleave="this.classList.remove('dragover')"
    ondrop="handleDrop(event)">
    <input type="file" id="file-input" accept=".html" style="display:none" onchange="handleFile(this.files[0])">
    <div class="drop-icon" id="drop-icon">📁</div>
    <div class="drop-text" id="drop-text">タップしてファイルを選択<br>またはドラッグ&ドロップ</div>
    <div class="drop-filename" id="drop-filename"></div>
  </div>

  <button class="btn" id="deploy-btn" onclick="deploy()" disabled>
    🚀 ninja-choba.jp を更新する
  </button>

  <div class="progress" id="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="status" id="status"></div>

  <a href="https://ninja-choba.jp" class="back">← 忍者帳場AIに戻る</a>
</div>

<script>
let selectedFile = null;

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-area').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

function handleFile(file) {
  if (!file.name.endsWith('.html')) {
    showStatus('error', '.htmlファイルを選択してください');
    return;
  }
  selectedFile = file;
  document.getElementById('drop-area').classList.add('has-file');
  document.getElementById('drop-icon').textContent = '✅';
  document.getElementById('drop-text').textContent = 'ファイルを選択済み';
  document.getElementById('drop-filename').textContent = file.name + ' (' + Math.round(file.size/1024) + 'KB)';
  document.getElementById('deploy-btn').disabled = false;
  hideStatus();
}

async function deploy() {
  const pw = document.getElementById('admin-pw').value;
  if (!pw) { showStatus('error', 'パスワードを入力してください'); return; }
  if (!selectedFile) { showStatus('error', 'ファイルを選択してください'); return; }

  const btn = document.getElementById('deploy-btn');
  btn.disabled = true;
  btn.textContent = '🔄 アップロード中...';
  showStatus('loading', '📤 ファイルをアップロード中...');
  animateProgress(0, 40, 1500);

  try {
    const formData = new FormData();
    formData.append('file', selectedFile);

    const res = await fetch('/api/deploy', {
      method: 'POST',
      headers: { 'X-Admin-Password': pw },
      body: formData,
    });

    animateProgress(40, 80, 1000);
    const data = await res.json();

    if (data.ok) {
      animateProgress(80, 100, 500);
      showStatus('success',
        '✅ ' + data.message + '\n\n' +
        '数分後に https://ninja-choba.jp を開いて確認してください。\n' +
        'Safariのキャッシュをクリアすると確実です。'
      );
      btn.textContent = '✅ 更新完了';
      // 30秒後に確認用リンクを開く
      setTimeout(() => {
        if (confirm('ninja-choba.jp を開いて確認しますか？')) {
          window.open('https://ninja-choba.jp', '_blank');
        }
      }, 5000);
    } else {
      showStatus('error', '❌ ' + (data.error || '更新に失敗しました'));
      btn.disabled = false;
      btn.textContent = '🚀 ninja-choba.jp を更新する';
    }
  } catch(e) {
    showStatus('error', '❌ ネットワークエラー: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🚀 ninja-choba.jp を更新する';
  }
}

function animateProgress(from, to, duration) {
  const bar = document.getElementById('progress-bar');
  const prog = document.getElementById('progress');
  prog.style.display = 'block';
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    bar.style.width = (from + (to - from) * t) + '%';
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.style.display = 'block';
  el.textContent = msg;
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

// パスワードが入力されたらボタンを有効化
document.getElementById('admin-pw').addEventListener('input', () => {
  if (selectedFile && document.getElementById('admin-pw').value) {
    document.getElementById('deploy-btn').disabled = false;
  }
});
</script>
</body>
</html>
